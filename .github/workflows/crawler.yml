name: Naver Cafe Crawler

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Python 설치
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Chrome 설치
        uses: browser-actions/setup-chrome@v1

      - name: 라이브러리 설치
        run: pip install selenium webdriver-manager requests firebase-admin

      - name: 크롤러 실행
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_CREDENTIALS }}
        run: python NaverBlogCrawler.py

      - name: JSON 파일 GitHub에 커밋 (백업용)
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add articles.json
          git diff --staged --quiet || git commit -m "Update articles.json [$(date -u '+%Y-%m-%d %H:%M')] UTC"
          git push